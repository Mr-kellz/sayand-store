<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAYAND | Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar Navigation */
        .sidebar { width: 250px; background: #fff; padding: 40px 30px; box-shadow: 2px 0 5px rgba(0,0,0,0.02); display: flex; flex-direction: column; }
        .sidebar h1 { font-weight: 800; letter-spacing: -1px; margin: 0 0 50px 0; font-size: 24px; }
        .nav-link { color: #666; text-decoration: none; font-size: 14px; font-weight: 600; margin-bottom: 20px; letter-spacing: 0.05em; transition: color 0.2s; }
        .nav-link:hover, .nav-link.active { color: #000; }
        .spacer { flex-grow: 1; }
        #sign-out-btn { background: none; border: none; color: #dc2626; text-align: left; padding: 0; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; letter-spacing: 0.05em; }
        
        /* Main Content Area */
        .main-content { flex-grow: 1; padding: 60px; overflow-y: auto; }
        .header { margin-bottom: 40px; border-bottom: 1px solid #ddd; padding-bottom: 20px; }
        .header h2 { margin: 0; font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
        .user-email { color: #666; font-size: 14px; margin-top: 10px; }
        
        /* Dashboard Cards */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { background: #fff; padding: 30px; border: 1px solid #eee; }
        .card h3 { margin: 0 0 15px 0; font-size: 16px; }
        .card p { color: #666; font-size: 14px; line-height: 1.6; margin: 0; }
        .action-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #000; color: #fff; text-decoration: none; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>SAYAND</h1>
        <a href="#" class="nav-link active">Overview</a>
        <a href="#" class="nav-link">Order History</a>
        <a href="#" class="nav-link">Settings</a>
        <a href="index.html" class="nav-link">Back to Store</a>
        
        <div class="spacer"></div>
        <button id="sign-out-btn">SIGN OUT</button>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>My Account</h2>
            <div class="user-email" id="display-email">Loading...</div>
        </div>

        <div class="card-grid">
            <div class="card">
                <h3>Recent Orders</h3>
                <p>You haven't placed any orders yet. Discover our latest premium drops.</p>
                <a href="index.html" class="action-btn">SHOP NOW</a>
            </div>
            
            <div class="card">
                <h3>Profile Details</h3>
                <p>Manage your shipping addresses and payment methods for a faster checkout.</p>
                <a href="#" class="action-btn">EDIT PROFILE</a>
            </div>
        </div>
    </div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
