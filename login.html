<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAYAND | Account</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .auth-container { background: #fff; padding: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; }
        h1 { font-weight: 800; letter-spacing: -1px; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; font-weight: 600; letter-spacing: 0.1em; cursor: pointer; margin-bottom: 15px; transition: background 0.2s; }
        button:hover { background: #333; }
        
        .social-btn { background: #fff; color: #000; border: 1px solid #000; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .social-btn:hover { background: #f9f9f9; }
        .social-btn img { width: 18px; height: 18px; }
        
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #999; font-size: 12px; letter-spacing: 0.1em; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eee; }
        .divider::before { margin-right: .5em; }
        .divider::after { margin-left: .5em; }
        
        .toggle-text { font-size: 12px; color: #666; cursor: pointer; text-decoration: underline; margin-top: 15px; display: block; }
        #error-message { color: #dc2626; font-size: 12px; margin-bottom: 15px; min-height: 18px; }
        
        .name-fields { transition: all 0.3s ease; }
        .name-fields.hidden { display: none; }
        
        .consent-text { font-size: 11px; color: #999; line-height: 1.5; margin-top: 20px; }
        .consent-text a { color: #666; text-decoration: underline; }
        
        .forgot-link { font-size: 12px; color: #666; text-decoration: underline; cursor: pointer; display: block; margin-bottom: 15px; }
        .forgot-link:hover { color: #000; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>SAYAND</h1>
        <div id="error-message"></div>
        
        <form id="auth-form">
            <div id="name-fields" class="name-fields hidden">
                <input type="text" id="firstName" placeholder="First Name">
                <input type="text" id="lastName" placeholder="Last Name">
            </div>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <a href="#" class="forgot-link" id="forgot-password">Forgot password?</a>
            <button type="submit" id="auth-button">SIGN IN</button>
        </form>

        <span class="toggle-text" id="toggle-mode">Need an account? Sign up here.</span>

        <div class="divider">OR</div>

        <button id="google-login" class="social-btn">
            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/google/google-original.svg" alt="Google">
            CONTINUE WITH GOOGLE
        </button>
        
        <button id="apple-login" class="social-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple">
            CONTINUE WITH APPLE
        </button>
        
        <p class="consent-text">
            By logging in with my social login, I agree to link my account in accordance with the 
            <a href="privacy.html" target="_blank">Sayand Privacy Policy</a>.
        </p>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
